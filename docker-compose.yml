services:
  postgres:
    image: postgres:18-alpine
    container_name: "postgres"
    environment:
      POSTGRES_USER: asobeast
      POSTGRES_PASSWORD: asobeast
      POSTGRES_DB: asobeast
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asobeast"]
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:8-alpine
    container_name: "redis"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  api:
    container_name: "api"
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://asobeast:asobeast@postgres:5432/asobeast
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 4000
      DEFAULT_COUNTRY: us
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  web:
    container_name: "web"
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    environment:
      API_INTERNAL_URL: http://api:4000
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - api
volumes:
  pgdata:
  redisdata:
